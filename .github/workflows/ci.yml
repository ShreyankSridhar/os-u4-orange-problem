name: PES-VCS CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc make libssl-dev

      - name: Build
        run: |
          make clean
          make all

      - name: Unit tests
        run: |
          ./test_objects
          ./test_tree

      - name: Integration test
        run: |
          make test-integration
